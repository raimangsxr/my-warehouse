name: Frontend - Build & Push Docker image on Release

on:
  release:
    types: [published]

permissions:
  contents: read

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/${{ github.event.repository.name }}-frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract release tag
        id: meta
        run: |
          # GITHUB_REF_NAME en releases suele ser el tag (p.ej. v1.2.3)
          echo "tag=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
            ${{ env.IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

  pr-update-argocd-apps:
    name: Create PR in argocd-apps (bump image tags)
    needs: build-and-push
    runs-on: ubuntu-latest

    env:
      VERSION: ${{ github.ref_name }} # tag de la release
      TARGET_REPO: raimangsxr/argocd-apps
      TARGET_BRANCH: main

      # Ajusta estos nombres a tus imágenes reales en DockerHub:
      BACKEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/my-warehouse-backend
      FRONTEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/my-warehouse-frontend
      MIGRATE_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/my-warehouse-backend

      MANIFEST_BACKEND: manifests/my-warehouse/backend.yaml
      MANIFEST_FRONTEND: manifests/my-warehouse/frontend.yaml
      MANIFEST_MIGRATE: manifests/my-warehouse/migration-job.yaml

    steps:
      - name: Checkout argocd-apps
        uses: actions/checkout@v4
        with:
          repository: ${{ env.TARGET_REPO }}
          ref: ${{ env.TARGET_BRANCH }}
          token: ${{ secrets.ARGOCD_APPS_TOKEN }}
          path: argocd-apps

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          yq --version

      - name: Install GitHub CLI (gh)
        run: |
          sudo apt-get update
          sudo apt-get install -y gh
          gh --version

      - name: Create branch
        working-directory: argocd-apps
        run: |
          git checkout -b "bump-my-warehouse-${VERSION}"

      - name: Update image tags in manifests
        working-directory: argocd-apps
        run: |
          set -euo pipefail

          update_deploy_image() {
            local file="$1"
            local cname="$2"
            local image="$3"

            # 1) Intento por nombre de contenedor (si existe .name)
            yq -i '
              .spec.template.spec.containers |=
              (map(if has("name") and .name == strenv(CNAME) then .image = strenv(IMAGE) + ":" + strenv(VERSION) else . end))
            ' "$file" 2>/dev/null || true

            # 2) Fallback: si no hay names / un solo contenedor
            yq -i '.spec.template.spec.containers[0].image = strenv(IMAGE) + ":" + strenv(VERSION)' "$file"
          }

          update_job_image() {
            local file="$1"
            local cname="$2"
            local image="$3"

            # Job: spec.template.spec.containers
            yq -i '
              .spec.template.spec.containers |=
              (map(if has("name") and .name == strenv(CNAME) then .image = strenv(IMAGE) + ":" + strenv(VERSION) else . end))
            ' "$file" 2>/dev/null || true

            yq -i '.spec.template.spec.containers[0].image = strenv(IMAGE) + ":" + strenv(VERSION)' "$file"
          }

          export VERSION

          # Backend (Deployment)
          export CNAME="backend" IMAGE="${BACKEND_IMAGE}"
          update_deploy_image "${MANIFEST_BACKEND}" "$CNAME" "$IMAGE"

          # Frontend (Deployment)
          export CNAME="frontend" IMAGE="${FRONTEND_IMAGE}"
          update_deploy_image "${MANIFEST_FRONTEND}" "$CNAME" "$IMAGE"

          # Migration (Job)
          export CNAME="migrate" IMAGE="${MIGRATE_IMAGE}"
          update_job_image "${MANIFEST_MIGRATE}" "$CNAME" "$IMAGE"

          echo "Updated manifests:"
          git diff -- "${MANIFEST_BACKEND}" "${MANIFEST_FRONTEND}" "${MANIFEST_MIGRATE}" || true

      - name: Commit changes
        working-directory: argocd-apps
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add "${MANIFEST_BACKEND}" "${MANIFEST_FRONTEND}" "${MANIFEST_MIGRATE}"
          git status

          git commit -m "chore(my-warehouse): bump images to ${VERSION}" || {
            echo "No changes to commit (maybe already bumped)."
            exit 0
          }

      - name: Push branch
        working-directory: argocd-apps
        run: |
          git push --set-upstream origin "bump-my-warehouse-${VERSION}"

      - name: Create Pull Request
        working-directory: argocd-apps
        env:
          GH_TOKEN: ${{ secrets.ARGOCD_APPS_TOKEN }}
        run: |
          gh pr create \
            --repo "${TARGET_REPO}" \
            --base "${TARGET_BRANCH}" \
            --head "bump-my-warehouse-${VERSION}" \
            --title "chore(my-warehouse): bump images to ${VERSION}" \
            --body "Automated update from my-warehouse release ${VERSION}: backend, frontend, migration-job image tags."