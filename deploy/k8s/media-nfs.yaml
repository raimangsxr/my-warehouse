apiVersion: v1
kind: PersistentVolume
metadata:
  name: my-warehouse-backend-media-pv
  labels:
    app.kubernetes.io/name: my-warehouse-backend-media
spec:
  capacity:
    storage: 200Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: nfs-media
  mountOptions:
    - nfsvers=4.1
    - hard
    - timeo=600
    - retrans=2
  nfs:
    server: 10.0.0.10
    path: /exports/my-warehouse/media
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: my-warehouse-backend-media
  namespace: my-warehouse
  labels:
    app.kubernetes.io/name: my-warehouse-backend-media
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 200Gi
  storageClassName: nfs-media
  volumeName: my-warehouse-backend-media-pv
